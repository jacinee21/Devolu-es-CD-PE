<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────
const SHEET_URL = "https://docs.google.com/spreadsheets/d/1j7cqYoM_e6WVrvUjeW49uIBUHdd4znWB_2LrFg4kwAw/gviz/tq?tqx=out:json&gid=833587704";

let dadosSheet    = [];
let historico     = [];
let buscaTimeout  = null;

// ─── PLANILHA ─────────────────────────────────────────────────────────────
async function carregarPlanilha() {
  const status = document.getElementById('sheet-status');
  status.textContent = 'conectando...';
  status.className = '';
  
  const selectReg = document.getElementById('r-cd-filtro');
  const selectHist = document.getElementById('f-estab-hist');
  
  try {
    const resp = await fetch(SHEET_URL);
    const text = await resp.text();

    // Corrige retorno do Google Sheets
    const json = JSON.parse(text.substring(47).slice(0, -2));

    const rows = json.table.rows.map(r =>
      r.c.map(c => c ? c.v : "")
    );

    dadosSheet = [];

    for (let i = 1; i < rows.length; i++) {
      const r = rows[i];
      if (!r[1] && !r[2]) continue;

      dadosSheet.push({
        estabelecimento: String(r[0] || '').trim(),
        pedido:          String(r[1] || '').trim(),
        nf:              String(r[2] || '').trim(),
        cliente:         String(r[3] || '').trim(),
        vendedor:        String(r[4] || '').trim(),
        supervisor:      String(r[5] || '').trim(),
        emailVend:       String(r[6] || '').trim(),
        emailSup:        String(r[7] || '').trim()
      });
    }

    status.textContent = dadosSheet.length + ' registros';
    status.className = 'ok';

    const cds = [...new Set(dadosSheet.map(r => r.estabelecimento).filter(Boolean))].sort();

    selectReg.disabled = false;
    selectReg.innerHTML = '<option value="">(Nenhum filtro)</option>';
    selectHist.innerHTML = '<option value="">Todos os CDs</option>';

    cds.forEach(cd => {
      selectReg.innerHTML += `<option value="${cd}">${cd}</option>`;
      selectHist.innerHTML += `<option value="${cd}">${cd}</option>`;
    });

  } catch (e) {
    console.error(e);
    status.textContent = 'erro ao conectar';
    status.className = 'err';
    selectReg.innerHTML = '<option value="">Erro ao carregar</option>';
  }
}

// ─── TABS ─────────────────────────────────────────────────────────────────
function goTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('p-' + name).classList.add('on');
  if (name === 'historico') renderHist();
}

// ─── BUSCA ────────────────────────────────────────────────────────────────
function buscarNota() {
  clearTimeout(buscaTimeout);
  buscaTimeout = setTimeout(_buscar, 300);
}

function _buscar() {
  const cdFiltro = document.getElementById('r-cd-filtro').value;
  const pedido   = document.getElementById('r-pedido').value.trim();
  const nf       = document.getElementById('r-nota').value.trim();

  const found   = document.getElementById('r-found');
  const nfound  = document.getElementById('r-nfound');
  const extra   = document.getElementById('r-extra');

  found.style.display  = 'none';
  nfound.style.display = 'none';
  extra.style.display  = 'none';

  if (!pedido && !nf) return;

  const norm = s => String(s || '').trim();

  const registro = dadosSheet.find(r =>
    (cdFiltro ? r.estabelecimento === cdFiltro : true) &&
    ((pedido && norm(r.pedido) === norm(pedido)) ||
     (nf     && norm(r.nf)    === norm(nf)))
  );

  if (registro) {
    found.style.display = 'block';
    found.innerHTML = `<strong>Registro encontrado</strong> — ${registro.estabelecimento} | Pedido: ${registro.pedido} | NF: ${registro.nf}`;

    document.getElementById('r-estab').value = registro.estabelecimento;
    document.getElementById('r-cli').value   = registro.cliente;
    document.getElementById('r-vend').value  = registro.vendedor;
    document.getElementById('r-sup').value   = registro.supervisor;

    extra.style.display = 'block';
    extra._registro = registro;
  } else {
    nfound.style.display = 'block';
  }
}

// ─── INIT ─────────────────────────────────────────────────────────────────
document.getElementById('r-data').value = new Date().toISOString().split('T')[0];
carregarPlanilha();
</script>
